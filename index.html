<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css" class="">
</head>
<body>
    
<div class="root">
    <div id ="switch">
        <a href="index2.html" class="link">Switch</a>
    </div>
    <div class="rectangle">
        <div class="time">
            <div class="hr" id="shr">00</div>
            <div class="min" id="smin">00</div>
            <div class="seconds" id="ssec">00</div>
        </div>
        <div class="buttons">
            <div class="start" id="sstart">START</div>
            <div class="stop" id="spause">PAUSE</div>
            <div class="reset" id="sreset">RESET</div>
        </div>
    </div>
    <div class="name"><h2>Stopwatch</h2></div>
    <div class="info" id="info"><p>This Stopwatch is Designed my Lucyfer</p></div>
</div>


    <script src="script.js"></script>
</body>
</html>
