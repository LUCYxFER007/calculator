<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="style.css" class="">
</head>
<body>
    
<div class="root">
    <div id ="switch">
        <a href="index.html" class="link">Switch</a>
    </div>
    <div class="rectangle">
        <div class="time">
            <div class="hr"id="thr" contenteditable="true">00</div>
            <div class="min" id="tmin" contenteditable="true">00</div>
            <div class="seconds" id="tsec" contenteditable="true">00</div>
        </div>
        <div class="buttons">
            <div class="start" id="tstart">START</div>
            <div class="stop" id="tstop">STOP</div>
            <div class="reset" id="treset">RESET</div>
        </div>
    </div>
    <div class="name"><h2 id="tname">Timer</h2></div>
    <div class="info"><p>This Timer is Designed my Lucyfer</p></div>
</div>


    <script src="timer.js"></script>
</body>
</html>
